name: Build add-on

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run unit tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest syslog/tests/ -v

  build:
    needs: test
    permissions:
      contents: read
      packages: write
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    name: Build ${{ matrix.arch }} syslog add-on
    strategy:
      matrix:
        arch: ["aarch64", "amd64"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./syslog"

      - name: Set build arguments
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "TEST_FLAG=--test" >> $GITHUB_ENV;
          fi
          if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              echo "VERSION_FLAG=--version dev --no-latest" >> $GITHUB_ENV;
          fi

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build syslog add-on
        uses: home-assistant/builder@2025.11.0
        with:
          image: ${{ matrix.arch == 'aarch64' && 'aarch64' || 'amd64' }}
          args: |
            ${{ env.TEST_FLAG }} \
            ${{ env.VERSION_FLAG }} \
            --${{ matrix.arch }} \
            --target /data/syslog \
            --addon
